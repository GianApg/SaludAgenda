<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Citas - SaludAgenda</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="estilos.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="index.html">SaludAgenda</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="registro.html">Agendar Cita</a></li>
        <li class="nav-item"><a class="nav-link active" href="citas.html">Mis Citas</a></li>
        <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <h3 class="mb-3">Mis Citas</h3>

  <div class="card mb-3 shadow-sm">
    <div class="card-body">
      <div class="row g-2 align-items-end">
        <div class="col-md-3">
          <label class="form-label">Especialidad</label>
          <select class="form-select form-select-sm" id="fEsp">
            <option value="">Todas</option>
            <option>Medicina General</option><option>Cardiología</option>
            <option>Pediatría</option><option>Ginecología</option>
            <option>Odontología</option><option>Oftalmología</option>
            <option>Dermatología</option><option>Traumatología</option>
            <option>Neurología</option><option>Psicología</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Desde</label>
          <input type="date" class="form-control form-control-sm" id="fDesde">
        </div>
        <div class="col-md-2">
          <label class="form-label">Hasta</label>
          <input type="date" class="form-control form-control-sm" id="fHasta">
        </div>
        <div class="col-md-2">
          <label class="form-label">Estado</label>
          <select class="form-select form-select-sm" id="fEstado">
            <option value="">Todos</option>
            <option>Programada</option><option>Confirmada</option><option>Cancelada</option>
          </select>
        </div>
        <div class="col-md-3">
          <button class="btn btn-primary btn-sm me-1" onclick="filtrar()">Buscar</button>
          <button class="btn btn-secondary btn-sm" onclick="limpiarFiltros()">Limpiar</button>
        </div>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-between mb-2">
    <small class="text-muted">Total: <b id="total">0</b> cita(s)</small>
    <div>
      <a href="registro.html" class="btn btn-success btn-sm me-1">+ Nueva Cita</a>
      <button class="btn btn-outline-secondary btn-sm" onclick="exportarTXT()">Exportar TXT</button>
    </div>
  </div>

  <div class="table-responsive shadow-sm">
    <table class="table table-bordered table-hover mb-0">
      <thead class="table-primary">
        <tr><th>#</th><th>Nombre</th><th>Especialidad</th><th>Fecha</th><th>Hora</th><th>Estado</th><th>Acciones</th></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="sinCitas" class="text-center py-4 text-muted d-none">
      No hay citas. <a href="registro.html">Agendar una cita</a>.
    </div>
  </div>
</div>

<!-- Modal detalle -->
<div class="modal fade" id="mDetalle" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header bg-primary text-white">
      <h5 class="modal-title">Detalle</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
    </div>
    <div class="modal-body" id="bodyDetalle"></div>
    <div class="modal-footer"><button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cerrar</button></div>
  </div></div>
</div>

<!-- Modal estado -->
<div class="modal fade" id="mEstado" tabindex="-1">
  <div class="modal-dialog modal-sm"><div class="modal-content">
    <div class="modal-header bg-primary text-white">
      <h5 class="modal-title">Cambiar Estado</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="idEstado">
      <select class="form-select" id="nuevoEstado">
        <option>Programada</option><option>Confirmada</option><option>Cancelada</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
      <button class="btn btn-primary btn-sm" onclick="guardarEstado()">Guardar</button>
    </div>
  </div></div>
</div>

<footer><p>© 2025 SaludAgenda</p></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let vista = [];
const gc = () => JSON.parse(localStorage.getItem('citas') || '[]');
const sc = (c) => localStorage.setItem('citas', JSON.stringify(c));
const badge = (e) => ({ Programada: 'bg-primary', Confirmada: 'bg-success', Cancelada: 'bg-danger' }[e] || 'bg-secondary');

function render(citas) {
  vista = citas;
  document.getElementById('total').textContent = citas.length;
  const tbody = document.getElementById('tbody');
  const sinCitas = document.getElementById('sinCitas');
  if (!citas.length) { tbody.innerHTML = ''; sinCitas.classList.remove('d-none'); return; }
  sinCitas.classList.add('d-none');
  tbody.innerHTML = citas.map((c, i) => `
    <tr>
      <td>${i + 1}</td>
      <td>${c.nombre}<br><small class="text-muted">${c.email}</small></td>
      <td>${c.especialidad}</td>
      <td>${c.fecha}</td>
      <td>${c.hora}</td>
      <td><span class="badge ${badge(c.estado)}">${c.estado}</span></td>
      <td>
        <button class="btn btn-sm btn-outline-info me-1" onclick="verDetalle(${c.id})">Ver</button>
        <button class="btn btn-sm btn-outline-warning me-1" onclick="editar(${c.id})">Editar</button>
        <button class="btn btn-sm btn-outline-secondary me-1" onclick="abrirEstado(${c.id})">Estado</button>
        <button class="btn btn-sm btn-outline-danger" onclick="eliminar(${c.id})">Eliminar</button>
      </td>
    </tr>`).join('');
}

function filtrar() {
  let c = gc();
  const esp   = document.getElementById('fEsp').value;
  const desde = document.getElementById('fDesde').value;
  const hasta = document.getElementById('fHasta').value;
  const est   = document.getElementById('fEstado').value;
  if (esp)   c = c.filter(x => x.especialidad === esp);
  if (est)   c = c.filter(x => x.estado === est);
  if (desde) c = c.filter(x => x.fecha >= desde);
  if (hasta) c = c.filter(x => x.fecha <= hasta);
  render(c);
}

function limpiarFiltros() {
  ['fEsp','fDesde','fHasta','fEstado'].forEach(id => document.getElementById(id).value = '');
  render(gc());
}

function verDetalle(id) {
  const c = gc().find(x => x.id == id);
  document.getElementById('bodyDetalle').innerHTML = `
    <table class="table table-sm">
      ${Object.entries({ Nombre: c.nombre, Correo: c.email, Teléfono: c.telefono,
        Especialidad: c.especialidad, Fecha: c.fecha, Hora: c.hora, Estado: c.estado, Motivo: c.motivo })
        .map(([k, v]) => `<tr><th>${k}</th><td>${v}</td></tr>`).join('')}
    </table>`;
  new bootstrap.Modal(document.getElementById('mDetalle')).show();
}

function editar(id) {
  localStorage.setItem('editCitaId', id);
  location.href = 'registro.html';
}

function abrirEstado(id) {
  const c = gc().find(x => x.id == id);
  document.getElementById('idEstado').value = id;
  document.getElementById('nuevoEstado').value = c.estado;
  new bootstrap.Modal(document.getElementById('mEstado')).show();
}

function guardarEstado() {
  const c = gc();
  const idx = c.findIndex(x => x.id == document.getElementById('idEstado').value);
  if (idx >= 0) { c[idx].estado = document.getElementById('nuevoEstado').value; sc(c); }
  bootstrap.Modal.getInstance(document.getElementById('mEstado')).hide();
  filtrar();
}

function eliminar(id) {
  if (!confirm('¿Eliminar esta cita?')) return;
  sc(gc().filter(c => c.id != id));
  filtrar();
}

function exportarTXT() {
  const citas = vista.length ? vista : gc();
  if (!citas.length) { alert('No hay citas para exportar.'); return; }
  let txt = `SALUDAGENDA - LISTADO DE CITAS\nFecha: ${new Date().toLocaleString('es-MX')}\nTotal: ${citas.length}\n${'='.repeat(40)}\n\n`;
  citas.forEach((c, i) => {
    txt += `Cita #${i+1}\nNombre: ${c.nombre}\nEspecialidad: ${c.especialidad}\nFecha: ${c.fecha} ${c.hora}\nEstado: ${c.estado}\nMotivo: ${c.motivo}\n${'-'.repeat(40)}\n\n`;
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt], { type: 'text/plain' }));
  a.download = 'citas.txt';
  a.click();
}

document.addEventListener('DOMContentLoaded', () => render(gc()));
</script>
</body>
</html>
